<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#fff7f7" />
    <title>舞搭一下</title>
  </head>
  <body>
    <div id="boot-fallback" style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,PingFang SC,Hiragino Sans GB,Microsoft YaHei,sans-serif;color:#2b2928;background:#fff7f7;">
      <div style="max-width:360px;text-align:center;line-height:1.6;">
        <div style="font-size:22px;font-weight:800;">舞搭一下</div>
        <div id="boot-status" style="margin-top:10px;font-size:14px;color:#6b6361;">正在加载页面…</div>
      </div>
    </div>
    <div id="root"></div>
    <script>
      window.setTimeout(function () {
        var status = document.getElementById('boot-status');
        if (status && !window.__APP_BOOTSTRAPPED__) {
          status.textContent = '加载稍慢，请检查网络后重试';
        }
      }, 3000);
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
